<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milena Thought | Offizielle Webseite</title>
    <style>
        :root {
            --bg-main: #070a13;
            --bg-card: #111625;
            --bg-card-hover: #171e32;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-purple: #a855f7;
            --accent-indigo: #6366f1;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --border: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            padding-top: 80px;
        }

        /* Feste Navigation */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(7, 10, 19, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        nav {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 24px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--accent-indigo);
        }

        /* Container */
        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 55px;
        }

        section {
            scroll-margin-top: 110px;
        }

        /* Hero */
        .hero {
            background: linear-gradient(135deg, #13112c 0%, #230930 100%);
            border: 1px solid #2e2456;
            padding: 60px 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .hero h1 {
            font-size: 3.2rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.03em;
        }

        .hero p {
            font-size: 1.2rem;
            color: #c7d2fe;
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        /* Biografie & Profilbild-Grid */
        .profile-card {
            display: flex;
            gap: 35px;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .profile-img {
            flex: 0 0 240px;
            width: 240px;
            height: 240px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid var(--accent-purple);
            background: #1e293b;
        }

        .bio-content h2 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .bio-content p {
            color: var(--text-muted);
            margin-bottom: 14px;
            font-size: 1rem;
        }

        /* Künstler-Analyse & Interpretation */
        .analysis-box {
            background: #111026;
            border: 1px solid #2a2559;
            padding: 25px;
            border-radius: 16px;
            margin-top: 20px;
        }

        .analysis-box h3 {
            font-size: 1.1rem;
            color: #c7d2fe;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .analysis-box p {
            font-size: 0.95rem;
            color: #9cb3e1;
            line-height: 1.5;
            margin-bottom: 0;
        }

        .tag {
            display: inline-block;
            background: #16143c;
            color: #a5b4fc;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-right: 6px;
            margin-top: 6px;
            border: 1px solid #2e2a78;
        }

        /* Grid für Links */
        .section-title {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -0.01em;
        }

        .grid-subtitle {
            font-size: 1.1rem;
            color: #a5b4fc;
            margin-bottom: 14px;
            font-weight: 600;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
        }

        .link-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--text-muted);
            transform: translateY(-2px);
        }

        .link-text {
            display: flex;
            flex-direction: column;
        }

        .link-text .title {
            font-weight: 600;
            font-size: 1.05rem;
        }

        .link-text .desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .arrow {
            color: var(--accent-purple);
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .link-card:hover .arrow {
            transform: translateX(5px);
        }

        /* Video Einbettung */
        .video-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 20px;
        }

        .video-wrapper {
            aspect-ratio: 16 / 9;
            width: 100%;
            margin-top: 15px;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* Impressum */
        .legal-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .legal-section h3 {
            color: var(--text-main);
            margin-bottom: 6px;
            font-size: 1.05rem;
            margin-top: 16px;
        }

        .legal-section h3:first-child {
            margin-top: 0;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }

        /* Mobile Optimierung */
        @media (max-width: 768px) {
            .profile-card {
                flex-direction: column;
                text-align: center;
            }
            .profile-img {
                flex: 0 0 200px;
                width: 200px;
                height: 200px;
            }
            .nav-links {
                gap: 16px;
            }
            .nav-links a {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <nav>
            <div class="logo">Milena Thought</div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">Über mich</a></li>
                <li><a href="#links">Netzwerke</a></li>
                <li><a href="#video">Top Video</a></li>
                <li><a href="#legal">Impressum</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">

        <!-- Sektion 1: Home (Intro) -->
        <section id="home" class="hero">
            <h1>Milena Thought</h1>
            <p>EXPERIMENTAL ELECTRONIC • DARK WAVE • GOTHIC ROCK</p>
        </section>

        <!-- Sektion 2: Biografie & Tiefenrecherche -->
        <section id="about" class="profile-card">
            <!-- Lokales Bild lädt automatisch falls hochgeladen, sonst lädt ein passender Platzhalter -->
            <img src="artist-profile.jpg" alt="Milena Thought" class="profile-img" onerror="this.src='https://unsplash.com'">
            <div class="bio-content">
                <h2>Über das Musikprojekt</h2>
